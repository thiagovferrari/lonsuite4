<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lon Suite 2.0 — Patrimônio Científico</title>
  <meta name="description"
    content="Lon Suite 2.0 — Sistema de gestão de patrimônio científico com inteligência artificial. Organize, indexe e crie casos clínicos com IA." />
  <meta name="theme-color" content="#f8f9fa" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,200;0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,300;1,14..32,400&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            lon: {
              bg: '#f5f5f7',
              surface: 'rgba(255,255,255,0.88)',
              border: 'rgba(0,0,0,0.08)',
              accent: '#1d1d1f',
              blue: '#0071e3',
              'blue-hover': '#0077ed',
            }
          },
          boxShadow: {
            'apple': '0 2px 16px 0 rgba(0,0,0,0.06), 0 1px 4px 0 rgba(0,0,0,0.04)',
            'apple-md': '0 4px 24px 0 rgba(0,0,0,0.08), 0 2px 8px 0 rgba(0,0,0,0.04)',
            'apple-lg': '0 8px 40px 0 rgba(0,0,0,0.12), 0 4px 16px 0 rgba(0,0,0,0.06)',
            'apple-xl': '0 20px 60px 0 rgba(0,0,0,0.14), 0 8px 24px 0 rgba(0,0,0,0.08)',
            'inner-soft': 'inset 0 1px 4px rgba(0,0,0,0.06)',
          },
          borderRadius: {
            'apple': '14px',
            'apple-lg': '20px',
            'apple-xl': '28px',
            'apple-2xl': '36px',
          },
          animation: {
            'fade-in': 'fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
            'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { transform: 'translateY(16px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
            scaleIn: { '0%': { transform: 'scale(0.96)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
            float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
          },
          spacing: {
            '18': '4.5rem',
            '22': '5.5rem',
          }
        },
      },
    }
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      background-color: #f5f5f7;
      color: #1d1d1f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* Text selection */
    ::selection {
      background: rgba(0, 113, 227, 0.15);
      color: inherit;
    }

    /* Placeholder */
    textarea::placeholder,
    input::placeholder {
      color: #aeaeb2;
      font-weight: 300;
    }

    input,
    textarea,
    select {
      caret-color: #0071e3;
    }

    /* Glass morphism — Apple style */
    .glass {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: saturate(180%) blur(28px);
      -webkit-backdrop-filter: saturate(180%) blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.95);
    }

    .glass-dark {
      background: rgba(29, 29, 31, 0.86);
      backdrop-filter: saturate(180%) blur(28px);
      -webkit-backdrop-filter: saturate(180%) blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* Scrollbars */
    .no-scrollbar {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 5px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.22);
    }

    /* Prose document styling */
    .prose {
      max-width: none;
      line-height: 1.8;
    }

    .prose p {
      margin-bottom: 1.1em;
    }

    .prose h1,
    .prose h2,
    .prose h3 {
      font-weight: 600;
      margin-top: 1.6em;
      margin-bottom: 0.6em;
      line-height: 1.3;
    }

    .prose ul,
    .prose ol {
      margin-left: 1.6em;
      margin-bottom: 1em;
    }

    .prose li {
      margin-bottom: 0.3em;
    }

    /* Content editable placeholder */
    [contenteditable]:empty:before {
      content: attr(data-placeholder);
      color: #aeaeb2;
      font-style: italic;
      pointer-events: none;
    }

    /* Focus ring — Apple style */
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: none;
    }

    /* Smooth transitions */
    button,
    a {
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Animations */
    .animate-fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .animate-slide-up {
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .animate-scale-in {
      animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.06);
    }

    /* Card press effect */
    .card-press:active {
      transform: scale(0.98);
    }

    /* Google Blue minimal buttons (Ghost/Outline) */
    .btn-ai {
      background: rgba(66, 133, 244, 0.04);
      color: #4285F4 !important;
      border: 1px solid rgba(66, 133, 244, 0.3) !important;
      position: relative;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1) !important;
    }

    .btn-ai::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(66, 133, 244, 0.08);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .btn-ai:hover::before {
      opacity: 1;
    }

    .btn-ai>* {
      position: relative;
      z-index: 1;
    }

    .btn-ai:active {
      transform: scale(0.97) !important;
    }

    .btn-ai-outline {
      background: transparent;
      border: 1.5px solid transparent !important;
      background-clip: padding-box;
      position: relative;
      color: #4285F4;
    }

    .btn-ai-outline::after {
      content: '';
      position: absolute;
      inset: -1.5px;
      background: linear-gradient(135deg, #34A853, #EA4335, #4285F4);
      border-radius: inherit;
      z-index: -1;
    }

    /* Icon Google Blue */
    .icon-ai {
      color: #4285F4;
    }

    /* Sidebar active icon */
    .nav-active-ai {
      background: #4285F4 !important;
      color: white !important;
      box-shadow: 0 4px 16px rgba(66, 133, 244, 0.35) !important;
    }
  </style>

{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>

</body>

</html>
