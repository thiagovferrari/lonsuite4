<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Lon Suite 4.0 — Patrimônio Científico</title>
    <meta
      name="description"
      content="Lon Suite 4.0 — Sistema de gestão de patrimônio científico com inteligência artificial. Organize, indexe e crie cases científicos com IA."
    />
    <meta name="theme-color" content="#fafbfc" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,200;0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,300;1,14..32,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Geist', 'Inter', 'system-ui', 'sans-serif'] },
            colors: {
              lon: {
                bg: '#fafbfc',
                surface: 'rgba(255,255,255,0.92)',
                border: 'rgba(0,0,0,0.06)',
                accent: '#1d1d1f',
                blue: '#0071e3',
                'blue-hover': '#0077ed',
              },
            },
            boxShadow: {
              apple: '0 1px 8px 0 rgba(0,0,0,0.04), 0 0.5px 2px 0 rgba(0,0,0,0.03)',
              'apple-md': '0 2px 16px 0 rgba(0,0,0,0.06), 0 1px 4px 0 rgba(0,0,0,0.03)',
              'apple-lg': '0 6px 32px 0 rgba(0,0,0,0.08), 0 2px 8px 0 rgba(0,0,0,0.04)',
              'apple-xl': '0 16px 48px 0 rgba(0,0,0,0.10), 0 6px 16px 0 rgba(0,0,0,0.06)',
              'inner-soft': 'inset 0 1px 3px rgba(0,0,0,0.04)',
            },
            borderRadius: {
              apple: '10px',
              'apple-lg': '14px',
              'apple-xl': '20px',
              'apple-2xl': '24px',
            },
            animation: {
              'fade-in': 'fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
              'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
              float: 'float 6s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: {
                '0%': { transform: 'translateY(16px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              scaleIn: {
                '0%': { transform: 'scale(0.96)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              float: {
                '0%,100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-6px)' },
              },
            },
            spacing: { 18: '4.5rem', 22: '5.5rem' },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
